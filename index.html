<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>你画我猜 · 抽词</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  :root {
    --bg: #fafafa;
    --card: #ffffff;
    --text: #1a1a1a;
    --text-secondary: #8c8c8c;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --accent-light: #eef2ff;
    --border: #e5e5e5;
    --radius: 16px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    -webkit-tap-highlight-color: transparent;
  }

  /* ---- screen toggle ---- */
  .screen { display: none; width: 100%; max-width: 400px; }
  .screen.active { display: block; }

  /* ---- card ---- */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 28px;
    text-align: center;
  }

  /* ---- typography ---- */
  h1 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.3px;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 32px;
    line-height: 1.5;
  }

  /* ---- button: primary ---- */
  .btn-primary {
    display: block;
    width: 100%;
    padding: 16px;
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 2px;
  }
  .btn-primary:active {
    background: var(--accent-hover);
    transform: scale(0.98);
  }
  .btn-primary:disabled {
    opacity: 0.4;
    pointer-events: none;
  }

  /* ---- button: secondary ---- */
  .btn-secondary {
    flex: 1;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-secondary:active {
    background: var(--accent-light);
  }
  .btn-secondary.accent {
    flex: 2;
    color: #fff;
    background: var(--accent);
    border-color: var(--accent);
  }
  .btn-secondary.accent:active {
    background: var(--accent-hover);
  }

  /* ---- word pick cards ---- */
  .word-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 20px;
  }
  .word-option {
    padding: 16px 18px;
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
    text-align: center;
    letter-spacing: 0.5px;
  }
  .word-option:active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .word-option .hint {
    display: block;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-secondary);
    margin-top: 4px;
  }
  .word-option:active .hint {
    color: rgba(255,255,255,0.7);
  }

  /* ---- result ---- */
  .result-word {
    font-size: 36px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1px;
    line-height: 1.3;
    word-break: break-all;
    padding: 24px 0;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .result-hint {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 28px;
    min-height: 20px;
  }

  .btn-row {
    display: flex;
    gap: 10px;
  }

  /* ---- loading ---- */
  .loading-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    padding: 32px 0;
  }
  .dot-pulse {
    display: flex; gap: 6px;
  }
  .dot-pulse span {
    width: 8px; height: 8px;
    background: var(--text-secondary);
    border-radius: 50%;
    animation: pulse 1.2s infinite ease-in-out;
  }
  .dot-pulse span:nth-child(2) { animation-delay: 0.15s; }
  .dot-pulse span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes pulse {
    0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ---- error ---- */
  .error-msg {
    color: #dc2626;
    font-size: 13px;
    margin-top: 12px;
    display: none;
  }
  .error-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px 28px;
    text-align: center;
    max-width: 400px;
    width: 100%;
  }
  .error-box h2 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 8px;
  }
  .error-box p {
    font-size: 13px;
    color: var(--text-secondary);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  /* ---- footer ---- */
  .footer {
    margin-top: 18px;
    font-size: 11px;
    color: #b0b0b0;
    text-align: center;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<!-- ===== Loading ===== -->
<div id="screen-loading" class="screen active">
  <div class="card">
    <div class="loading-wrap">
      <h1>你画我猜</h1>
      <div class="dot-pulse"><span></span><span></span><span></span></div>
      <p class="subtitle" style="margin-bottom:0">加载词库</p>
    </div>
  </div>
</div>

<!-- ===== Error ===== -->
<div id="screen-error" class="screen">
  <div class="error-box">
    <h2>词库加载失败</h2>
    <p id="errorDetail">请检查网络连接后重试</p>
    <button class="btn-primary" onclick="initApp()" style="font-size:15px;padding:12px 28px;width:auto;display:inline-block;">重新加载</button>
  </div>
</div>

<!-- ===== Screen 1: Draw ===== -->
<div id="screen-draw" class="screen">
  <div class="card">
    <h1>你画我猜</h1>
    <p class="subtitle">点击按钮随机抽取 3 个词语</p>
    <button class="btn-primary" id="btnDraw" onclick="doDraw()">抽 词</button>
    <p class="error-msg" id="errDraw"></p>
  </div>
  <p class="footer" id="wordCount"></p>
</div>

<!-- ===== Screen 2: Pick ===== -->
<div id="screen-pick" class="screen">
  <div class="card">
    <h1>选择一个词语</h1>
    <p class="subtitle">本轮将使用你选中的词</p>
    <div class="word-list" id="wordCards"></div>
    <button class="btn-secondary" onclick="goBack()" style="width:100%;">返回重抽</button>
  </div>
</div>

<!-- ===== Screen 3: Result ===== -->
<div id="screen-result" class="screen">
  <div class="card">
    <h1>本轮词语</h1>
    <div class="result-word" id="resultWord"></div>
    <div class="result-hint" id="resultHint"></div>
    <div class="btn-row">
      <button class="btn-secondary" onclick="goDraw()">再抽一轮</button>
      <button class="btn-secondary accent" onclick="goDrawWithOld()">同组重选</button>
    </div>
  </div>
  <p class="footer">确定词语后，点击按钮重新抽取</p>
</div>

<script>
const CSV_URL = '你画我猜词库.csv';

let wordBank = [];
let currentWords = [];
let selectedWord = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function initApp() {
  showScreen('screen-loading');
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const csvText = await resp.text();
    const parsed = Papa.parse(csvText, {
      header: true, skipEmptyLines: true,
      transformHeader: h => h.trim(),
      transform: v => v.trim(),
    });
    wordBank = [];
    for (const row of parsed.data) {
      const word = row['词'] || '';
      const hint = row['解释（若有）'] || row['解释'] || '';
      if (word) wordBank.push({ word, hint });
    }
    if (wordBank.length === 0) throw new Error('词库为空');
    document.getElementById('wordCount').textContent = `词库 ${wordBank.length} 条`;
    showScreen('screen-draw');
  } catch (e) {
    console.error(e);
    document.getElementById('errorDetail').textContent = e.message;
    showScreen('screen-error');
  }
}

function drawWords(count) {
  if (wordBank.length === 0) return [];
  const n = Math.min(count, wordBank.length);
  const indices = wordBank.map((_, i) => i);
  for (let i = 0; i < n; i++) {
    const j = i + Math.floor(Math.random() * (indices.length - i));
    [indices[i], indices[j]] = [indices[j], indices[i]];
  }
  return indices.slice(0, n).map(i => wordBank[i]);
}

function doDraw() {
  document.getElementById('errDraw').style.display = 'none';
  if (wordBank.length === 0) {
    document.getElementById('errDraw').textContent = '词库为空';
    document.getElementById('errDraw').style.display = 'block';
    return;
  }
  currentWords = drawWords(3);
  const container = document.getElementById('wordCards');
  container.innerHTML = currentWords.map((w, i) =>
    `<div class="word-option" onclick="pickWord(${i})">${esc(w.word)}${w.hint ? `<span class="hint">${esc(w.hint)}</span>` : ''}</div>`
  ).join('');
  showScreen('screen-pick');
}

function pickWord(index) {
  selectedWord = currentWords[index];
  document.getElementById('resultWord').textContent = selectedWord.word;
  document.getElementById('resultHint').textContent = selectedWord.hint ? selectedWord.hint : '';
  showScreen('screen-result');
}

function goBack() { showScreen('screen-draw'); }
function goDraw() { currentWords = []; selectedWord = null; showScreen('screen-draw'); }
function goDrawWithOld() {
  if (currentWords.length === 0) { goDraw(); return; }
  document.getElementById('wordCards').innerHTML = currentWords.map((w, i) =>
    `<div class="word-option" onclick="pickWord(${i})">${esc(w.word)}${w.hint ? `<span class="hint">${esc(w.hint)}</span>` : ''}</div>`
  ).join('');
  showScreen('screen-pick');
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

initApp();
</script>
</body>
</html>
